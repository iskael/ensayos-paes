services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ensayos
      POSTGRES_PASSWORD: ensayos
      POSTGRES_DB: ensayos_paes
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ensayos -d ensayos_paes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
